name: Backend

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
    paths:
      - .github/workflows/ci.yml
      - .dockerignore
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - "crates/**"
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - .dockerignore
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - "crates/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: mediahub
          POSTGRES_USER: mediahub
          POSTGRES_PASSWORD: mediahub-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediahub -d mediahub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://mediahub:mediahub-ci-only@127.0.0.1:5432/mediahub
      MEDIAHUB_TEST_POSTGRES_URL: postgres://mediahub:mediahub-ci-only@127.0.0.1:5432/mediahub
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
      - run: sudo apt-get update && sudo apt-get install --yes libvips-dev
      - run: cargo fmt --check
      - name: Test workspace against PostgreSQL 17
        run: cargo test --workspace
      - run: cargo test -p mediahub-adapter-image --features libvips
      - run: cargo check -p mediahub-server --features docker-libvips
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  image:
    name: Container image
    needs: rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and publish image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mediahub-container
          cache-to: type=gha,mode=max,scope=mediahub-container
          provenance: mode=max
          sbom: ${{ github.event_name != 'pull_request' }}
