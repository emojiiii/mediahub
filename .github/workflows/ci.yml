name: CI

on:
  push:
    paths:
      - .github/workflows/ci.yml
      - Cargo.lock
      - Cargo.toml
      - "crates/**"
  pull_request:
    paths:
      - .github/workflows/ci.yml
      - Cargo.lock
      - Cargo.toml
      - "crates/**"

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_DB: mediahub
          POSTGRES_USER: mediahub
          POSTGRES_PASSWORD: mediahub-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediahub -d mediahub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://mediahub:mediahub-ci-only@127.0.0.1:5432/mediahub
      MEDIAHUB_TEST_POSTGRES_URL: postgres://mediahub:mediahub-ci-only@127.0.0.1:5432/mediahub
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install --yes libvips-dev
      - run: cargo fmt --check
      - name: Test workspace against PostgreSQL 17
        run: cargo test --workspace
      - run: cargo test -p mediahub-adapter-image --features libvips
      - run: cargo check -p mediahub-server --features docker-libvips
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
