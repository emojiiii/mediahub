services:
  mediahub:
    image: ${MEDIAHUB_IMAGE:-ghcr.io/emojiiii/mediahub:latest}
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      MEDIAHUB_BIND_ADDR: 0.0.0.0:3000
      MEDIAHUB_DATABASE_URL: ${MEDIAHUB_DATABASE_URL:-postgres://${MEDIAHUB_POSTGRES_USER:-mediahub}:${MEDIAHUB_POSTGRES_PASSWORD:?set_a_postgres_password}@postgres:5432/${MEDIAHUB_POSTGRES_DB:-mediahub}}
      MEDIAHUB_STORAGE_BACKEND: ${MEDIAHUB_STORAGE_BACKEND:-local}
      MEDIAHUB_STORAGE_ROOT: /data/storage
      # S3-compatible storage is selected with MEDIAHUB_STORAGE_BACKEND=s3.
      # Bucket is then required; credentials must be supplied as a pair when
      # static credentials are used. HTTPS endpoints are enforced by default.
      MEDIAHUB_S3_BUCKET: ${MEDIAHUB_S3_BUCKET:-}
      MEDIAHUB_S3_REGION: ${MEDIAHUB_S3_REGION:-us-east-1}
      MEDIAHUB_S3_ENDPOINT: ${MEDIAHUB_S3_ENDPOINT:-}
      MEDIAHUB_S3_ACCESS_KEY_ID: ${MEDIAHUB_S3_ACCESS_KEY_ID:-}
      MEDIAHUB_S3_SECRET_ACCESS_KEY: ${MEDIAHUB_S3_SECRET_ACCESS_KEY:-}
      MEDIAHUB_S3_SESSION_TOKEN: ${MEDIAHUB_S3_SESSION_TOKEN:-}
      MEDIAHUB_S3_ALLOW_HTTP: ${MEDIAHUB_S3_ALLOW_HTTP:-false}
      MEDIAHUB_S3_VIRTUAL_HOSTED_STYLE: ${MEDIAHUB_S3_VIRTUAL_HOSTED_STYLE:-false}
      MEDIAHUB_S3_PREFIX: ${MEDIAHUB_S3_PREFIX:-}
      # Required: base64-encoded 32-byte AES-256-GCM key from deployment
      # secret management. Compose refuses to start when it is not supplied.
      MEDIAHUB_ACCESS_KEY_MASTER_KEY: ${MEDIAHUB_ACCESS_KEY_MASTER_KEY:?set_a_32_byte_base64_master_key}
      MEDIAHUB_ACCESS_KEY_MASTER_KEY_VERSION: ${MEDIAHUB_ACCESS_KEY_MASTER_KEY_VERSION:-1}
      # Independent base64-encoded key used only to sign short-lived media URLs.
      MEDIAHUB_MEDIA_SIGNING_KEY: ${MEDIAHUB_MEDIA_SIGNING_KEY:?set_an_independent_32_byte_base64_media_signing_key}
      # Set to false after bootstrapping accounts to reject public registration.
      MEDIAHUB_REGISTRATION_ENABLED: ${MEDIAHUB_REGISTRATION_ENABLED:-false}
      # Browser consoles call the API directly. Use an exact comma-separated
      # allowlist; keep it empty when the console is served from the API origin.
      MEDIAHUB_CORS_ALLOWED_ORIGINS: ${MEDIAHUB_CORS_ALLOWED_ORIGINS:-}
      MEDIAHUB_ALLOW_INSECURE_COOKIES: ${MEDIAHUB_ALLOW_INSECURE_COOKIES:-false}
      MEDIAHUB_COOKIE_SAME_SITE: ${MEDIAHUB_COOKIE_SAME_SITE:-lax}
      # One-shot promotion of an existing verified account. Remove this value
      # after the first successful start; retaining it makes restart fail closed.
      MEDIAHUB_BOOTSTRAP_ADMIN_EMAIL: ${MEDIAHUB_BOOTSTRAP_ADMIN_EMAIL:-}
      # Optional dedicated Prometheus scrape credential (32-512 printable bytes).
      MEDIAHUB_METRICS_BEARER_TOKEN: ${MEDIAHUB_METRICS_BEARER_TOKEN:-}
      # Required in production. Resend sends verification and password-reset
      # messages from a verified domain to links on the public Web console.
      MEDIAHUB_RESEND_API_KEY: ${MEDIAHUB_RESEND_API_KEY:?set_a_resend_api_key}
      MEDIAHUB_EMAIL_FROM: ${MEDIAHUB_EMAIL_FROM:?set_a_verified_sender_address}
      MEDIAHUB_WEB_URL: ${MEDIAHUB_WEB_URL:?set_the_public_https_web_origin}
    volumes:
      - mediahub-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ${MEDIAHUB_POSTGRES_DB:-mediahub}
      POSTGRES_USER: ${MEDIAHUB_POSTGRES_USER:-mediahub}
      POSTGRES_PASSWORD: ${MEDIAHUB_POSTGRES_PASSWORD:?set_a_postgres_password}
    ports:
      - "127.0.0.1:${MEDIAHUB_POSTGRES_PORT:-5432}:5432"
    volumes:
      - mediahub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  mediahub-data:
  mediahub-postgres-data:
